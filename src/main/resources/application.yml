
spring:
  application:
    name: rag-demo
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

langchain4j:
  open-ai:
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${DASHSCOPE_API_KEY}
      model-name: qwen3.5-plus
      log-requests: true
      log-responses: true
    streaming-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${DASHSCOPE_API_KEY}
      model-name: qwen3.5-plus
      log-requests: true
      log-responses: true
logging:
  level:
    dev.langchain4j: debug
server:
  port: 8080